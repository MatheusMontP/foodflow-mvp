services:
  - type: web
    name: foodflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: ACCESS_TOKEN_MINUTES
        value: 60
      - key: REFRESH_TOKEN_DAYS
        value: 7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
